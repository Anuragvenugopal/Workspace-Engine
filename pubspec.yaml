name: workspace_engine
description: "Multi-Profile Workspace Engine — offline-first, multi-tenant Flutter app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local Storage (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.8.0+1
  retrofit: 4.6.0
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Environment Variables
  envied: ^1.1.0

  # Navigation
  go_router: ^15.1.2

  # Images
  cached_network_image: ^3.4.1

  # Calendar
  table_calendar: ^3.1.3

  # Firebase (stubbed — swap google-services.json to activate)
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5

  # Immutable Models
  freezed_annotation: ^2.4.4

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_advanced_drawer: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.15
  retrofit_generator: 9.6.0
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.5
  freezed: ^2.5.7
  envied_generator: ^1.1.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
